services:
  db:
    image: postgres:15
    container_name: carzone_db
    environment:
      POSTGRES_DB: carzone_db
      POSTGRES_USER: carzone_user
      POSTGRES_PASSWORD: StrongPassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - carzone-net
    restart: unless-stopped

  web:
    image: 236195543546.dkr.ecr.eu-west-1.amazonaws.com/carzone-django:latest
    container_name: carzone_app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      DB_NAME: carzone_db
      DB_USER: carzone_user
      DB_PASSWORD: StrongPassword123
      DB_HOST: carzone_db
      DB_PORT: 5432
    depends_on:
      - db
    networks:
      - carzone-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - carzone-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - carzone-net
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter
    container_name: node_exporter
    ports:
      - "9100:9100"
    networks:
      - carzone-net
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - carzone-net
    restart: unless-stopped

networks:
  carzone-net:
    driver: bridge

volumes:
  postgres_data:
  grafana_data: